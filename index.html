<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos 3 Meses ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #050a14 0%, #020408 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .heart-bg {
            position: absolute;
            color: #ff69b4;
            font-size: 22px;
            filter: drop-shadow(0 0 8px #ff1493);
            animation: float 8s linear infinite;
            z-index: 0;
            top: -10%;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            width: 90%;
            max-width: 820px;
            background: rgba(10, 15, 25, 0.95);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 20px rgba(255, 105, 180, 0.1);
            padding: 30px;
            z-index: 1;
            border: 1px solid #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #ff85a1;
            letter-spacing: 1px;
        }

        .counter {
            font-size: 14px;
            color: #7dd3fc;
            font-family: 'JetBrains Mono';
        }

        .terminal {
            background: #020408;
            border-radius: 12px;
            padding: 25px;
            height: 380px;
            overflow-y: auto;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.7;
            border: 1px solid rgba(125, 211, 252, 0.1);
        }

        .line { margin: 8px 0; }
        .pink { color: #ff85a1; font-weight: bold; }
        .cyan { color: #7dd3fc; }
        .distance-msg { 
            background: rgba(255, 133, 161, 0.1); 
            padding: 10px; 
            border-radius: 5px; 
            border-left: 3px solid #ff85a1;
        }

        .input-area {
            display: flex;
            margin-top: 20px;
            align-items: center;
        }

        .prompt { color: #ff85a1; margin-right: 12px; font-weight: bold; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #7dd3fc;
            font-family: "JetBrains Mono";
            font-size: 14px;
            outline: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            opacity: .4;
            text-align: center;
            text-transform: uppercase;
        }

        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title">💖 HEART_SHELL v3.2</div>
        <div id="counter" class="counter">Calculando...</div>
    </div>

    <div class="terminal" id="terminal">
        <div class="line">Sistema inicializado... <span class="cyan">[OK]</span></div>
        <div class="line">Data de início detectada: <span class="pink">10/12/2025</span></div>
        <div class="line">--------------------------------------------------</div>
        <div class="line">Digite <span class="pink">'help'</span> para ver os comandos, ou <span class="pink">'tempo'</span> para ver quanto tempo estamos juntos.</div>
    </div>

    <div class="input-area">
        <span class="prompt">nós@amor:~$</span>
        <input id="cmd" autofocus autocomplete="off">
    </div>

    <div class="footer">
        A distância é apenas um detalhe temporário.
    </div>
</div>

<script>
    // Correção: Mês no JS começa em 0 (Dezembro = 11)
    const startDate = new Date(2025, 11, 10, 0, 0, 0); 

    function getFullTime() {
        const now = new Date();
        const diff = now - startDate;
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        return `${days} dias, ${hours}h ${minutes}m ${seconds}s`;
    }

    function updateCounter() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("counter").innerHTML = `${days} DIAS ❤️`;
    }
    
    setInterval(updateCounter, 1000);
    updateCounter();

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart-bg');
        heart.innerHTML = '❤';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 600);

    const terminal = document.getElementById("terminal");
    const input = document.getElementById("cmd");

    const commands = {
        help: `Comandos:
        <span class="cyan">about</span>     - Resumo da jornada
        <span class="cyan">tempo</span>     - Contador detalhado
        <span class="cyan">distance</span>  - Sobre a distância
        <span class="cyan">love</span>      - Nível de amor
        <span class="cyan">secret</span>    - Mensagem secreta`,

        about: `Status: <span class="pink">3 meses de felicidade.</span>
        Início: 10/12/2025
        Linguagem: Amor Nativo v3.2`,

        distance: `<div class="distance-msg">
        A distância é passageira. Logo, logo, o 'bom dia' será 
        sussurrado e não apenas digitado. Aguenta firme!
        </div>`,

        love: `Love: [██████████████████] 1000%
        Saudade: [████████████████░░] 99%`,

        secret: `Três meses é pouco perto de tudo que eu quero viver com você!`
    };

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const cmd = input.value.toLowerCase().trim();
            if (!cmd) return;

            const line = document.createElement("div");
            line.className = "line";
            line.innerHTML = `<span class="pink">nós@amor:~$</span> ${cmd}`;
            terminal.appendChild(line);

            if (cmd === "tempo") {
                const timeLine = document.createElement("div");
                timeLine.className = "line";
                timeLine.innerHTML = `<span class="cyan">Estamos juntos há:</span><br>${getFullTime()}`;
                terminal.appendChild(timeLine);
            } else if (cmd === "clear") {
                const msg = document.createElement("div");
                msg.innerHTML = "Comando desativado para manter nossas memórias. ❤️";
                terminal.appendChild(msg);
            } else if (commands[cmd]) {
                const resp = document.createElement("div");
                resp.innerHTML = commands[cmd].replace(/\n/g, '<br>');
                terminal.appendChild(resp);
            } else {
                const err = document.createElement("div");
                err.innerHTML = "Comando inexistente.";
                terminal.appendChild(err);
            }

            input.value = "";
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>
</body>
</html>
