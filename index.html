<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Meses com Você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0b16 0%, #4a1936 50%, #1a0b16 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Corações Flutuantes no Fundo */
        .heart-bg {
            position: absolute;
            color: rgba(255, 105, 180, 0.2);
            font-size: 20px;
            animation: float 6s linear infinite;
            z-index: 0;
            top: -10%;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            width: 90%;
            max-width: 820px;
            background: rgba(20, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 35px;
            z-index: 1;
            border: 1px solid rgba(255, 20, 147, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #ff85a1;
            text-shadow: 0 0 10px rgba(255, 133, 161, 0.5);
        }

        .counter {
            font-size: 16px;
            font-weight: bold;
            background: rgba(255, 133, 161, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            color: #ff85a1;
        }

        .terminal {
            background: rgba(10, 5, 10, 0.9);
            border-radius: 12px;
            padding: 20px;
            height: 380px;
            overflow-y: auto;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: inset 0 0 15px rgba(255, 20, 147, 0.1);
            border: 1px solid rgba(255, 133, 161, 0.1);
        }

        .line { margin: 6px 0; }
        .pink { color: #ff85a1; }
        .cyan { color: #7dd3fc; }

        .input-area {
            display: flex;
            margin-top: 20px;
            font-family: "JetBrains Mono";
            align-items: center;
        }

        .prompt { color: #ff85a1; margin-right: 10px; font-weight: bold; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: "JetBrains Mono";
            font-size: 14px;
            outline: none;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: .6;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Scrollbar Personalizada */
        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-thumb { background: #ff85a1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title">❤️ MyHeart_Terminal v3.0</div>
        <div class="counter" id="counter">Caminhando juntos...</div>
    </div>

    <div class="terminal" id="terminal">
        <div class="line">Sessão iniciada: <span class="pink">Feliz 3 meses, meu amor!</span></div>
        <div class="line">Digite <span class="cyan">'help'</span> para descobrir nossos segredos.</div>
        <div class="line">--------------------------------------------------</div>
    </div>

    <div class="input-area">
        <span class="prompt">amor@nosso-futuro:~$</span>
        <input id="cmd" autofocus autocomplete="off">
    </div>

    <div class="footer">
        Feito com ❤️ por você sabe quem
    </div>
</div>

<script>
    // --- Configuração da Data ---
    const startDate = new Date("2025-12-10"); // Altere para a data exata do início

    function updateCounter() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("counter").innerHTML = `✨ ${days} dias de nós dois`;
    }
    setInterval(updateCounter, 1000);
    updateCounter();

    // --- Sistema de Corações de Fundo ---
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart-bg');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 3 + 's';
        heart.style.opacity = Math.random();
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 400);

    // --- Lógica do Terminal ---
    const terminal = document.getElementById("terminal");
    const input = document.getElementById("cmd");

    function print(text, color = "") {
        const div = document.createElement("div");
        div.className = "line";
        if (color) div.style.color = color;
        div.innerHTML = text.replace(/\n/g, '<br>');
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    const commands = {
        help: `Comandos disponíveis:
        <span class="cyan">about</span>     - Sobre o nosso sistema
        <span class="cyan">memories</span>  - Nossa linha do tempo
        <span class="cyan">future</span>    - O que ainda virá
        <span class="cyan">love</span>      - Diagnóstico do coração
        <span class="cyan">secret</span>    - Uma mensagem especial
        <span class="cyan">clear</span>     - Limpa o terminal`,

        about: `System: <span class="pink">Nossa História</span>
        Versão: 3 Meses (O melhor trimestre da minha vida)
        Status: <span class="pink">Cada dia mais apaixonado(a)</span>
        Uptime: ${Math.floor((new Date() - startDate)/(1000*60*60*24))} dias de pura felicidade.`,

        memories: `<span class="pink">git log --our-history:</span>
        - <b>Dezembro:</b> O começo de tudo, o melhor presente.
        - <b>Janeiro:</b> Descobrindo cada detalhe seu.
        - <b>Fevereiro:</b> A certeza de que eu quero você sempre.
        - <b>Março:</b> 3 meses de uma história infinita. ❤️`,

        future: `<b>Roadmap 2026 e Além:</b>
        [██████████] 100% - Te amar hoje
        [████████░░] 80%  - Próximas viagens
        [▓▓▓▓▓▓▓▓▓▓] ∞%   - Construir uma vida juntos`,

        love: `Analisando sentimentos...
        [SUCESSO] Batimentos cardíacos: Acelerados por você
        [SUCESSO] Nível de saudade: Constante
        [ALERTA] Nível de fofura: Acima do limite permitido ❤️`,

        secret: `<span style="font-size: 1.2em">Obrigado por esses 3 meses!</span>
        Você é a melhor parte do meu dia. Eu te amo daqui até a lua! 🌙✨`
    };

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const cmd = input.value.toLowerCase().trim();
            print(`<span class="pink">amor@nosso-futuro:~$</span> ${cmd}`);

            if (cmd === "clear") {
                terminal.innerHTML = "";
            } else if (commands[cmd]) {
                print(commands[cmd]);
            } else if (cmd !== "") {
                print("Comando não reconhecido. Tente 'help' para ver as opções.", "#ff4b2b");
            }

            input.value = "";
        }
    });
</script>

</body>
</html>
