<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Meses com Você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* Fundo Azul Marinho Profundo */
            background: radial-gradient(circle at center, #050a14 0%, #020408 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Corações Neon */
        .heart-bg {
            position: absolute;
            color: #ff69b4;
            font-size: 22px;
            filter: drop-shadow(0 0 8px #ff1493);
            animation: float 8s linear infinite;
            z-index: 0;
            top: -10%;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            width: 90%;
            max-width: 820px;
            background: rgba(10, 15, 25, 0.95);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 20px rgba(255, 105, 180, 0.1);
            padding: 30px;
            z-index: 1;
            border: 1px solid #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #ff85a1;
            text-shadow: 0 0 10px rgba(255, 133, 161, 0.4);
        }

        .counter-top {
            font-size: 14px;
            color: #7dd3fc;
            font-family: 'JetBrains Mono';
            font-weight: bold;
        }

        .terminal {
            background: #020408;
            border-radius: 12px;
            padding: 25px;
            height: 380px;
            overflow-y: auto;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.7;
            border: 1px solid rgba(125, 211, 252, 0.1);
        }

        .line { margin: 8px 0; }
        .pink { color: #ff85a1; font-weight: bold; }
        .cyan { color: #7dd3fc; }
        .gold { color: #ffd700; }

        .distance-msg { 
            background: rgba(255, 133, 161, 0.1); 
            padding: 12px; 
            border-radius: 5px; 
            border-left: 3px solid #ff85a1;
            margin: 10px 0;
        }

        .input-area {
            display: flex;
            margin-top: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
        }

        .prompt { color: #ff85a1; margin-right: 12px; font-weight: bold; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #7dd3fc;
            font-family: "JetBrains Mono";
            font-size: 14px;
            outline: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            opacity: .4;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #ff85a1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title">💖 HEART_SHELL v3.3</div>
        <div id="counter" class="counter-top">Calculando...</div>
    </div>

    <div class="terminal" id="terminal">
        <div class="line">Sistema inicializado... <span class="cyan">[OK]</span></div>
        <div class="line">Data de início: <span class="pink">10/12/2025</span></div>
        <div class="line">--------------------------------------------------</div>
        <div class="line">Olá, meu amor! Digite <span class="pink">'help'</span> para explorar o terminal.</div>
    </div>

    <div class="input-area">
        <span class="prompt">nós@amor:~$</span>
        <input id="cmd" autofocus autocomplete="off">
    </div>

    <div class="footer">
        conectado ao seu coração
    </div>
</div>

<script>
    // Configuração da data: 10 de Dezembro de 2025
    const startDate = new Date(2025, 11, 10, 0, 0, 0); 

    function getFullTime() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        return `${days} dias, ${hours}h ${minutes}m ${seconds}s`;
    }

    function updateCounter() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("counter").innerHTML = `${days} DIAS JUNTOS ❤️`;
    }
    setInterval(updateCounter, 1000);
    updateCounter();

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart-bg');
        heart.innerHTML = '❤';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 600);

    const terminal = document.getElementById("terminal");
    const input = document.getElementById("cmd");

    const commands = {
        help: `Comandos disponíveis:
        <span class="cyan">about</span>     - Resumo do sistema
        <span class="cyan">tempo</span>     - Tempo exato juntos
        <span class="cyan">memories</span>  - Nossa linha do tempo
        <span class="cyan">distance</span>  - Sobre a distância
        <span class="cyan">love</span>      - Diagnóstico do coração
        <span class="cyan">secret</span>    - Mensagem especial`,

        about: `System: <span class="pink">Nossa História</span>
        Versão: 3 Meses (O melhor trimestre da minha vida)
        Status: <span class="pink">Cada dia mais apaixonado(a)</span>
        Uptime: Detectando felicidade infinita...`,

        tempo: `<span class="cyan">Contagem precisa de amor:</span>
        <span class="gold">${getFullTime()}</span>
        Cada segundo valeu a pena.`,

        memories: `<span class="pink">git log --our-history:</span>
        - <b>Dezembro:</b> O começo de tudo, o melhor presente.
        - <b>Janeiro:</b> Descobrindo cada detalhe seu.
        - <b>Fevereiro:</b> A certeza de que eu quero você sempre.
        - <b>Março:</b> 3 meses de uma história infinita. ❤️`,

        distance: `<div class="distance-msg">
        <span class="pink">Sobre a distância:</span><br>
        A distância é apenas um número que tenta, sem sucesso, nos separar. 
        Ela é passageira, mas o que eu sinto por você é permanente. 
        Cada km de distância se torna um motivo a mais para eu querer estar do seu lado. 
        <span class="gold">O "em breve" é a minha palavra favorita.</span>
        </div>`,

        love: `Analisando sentimentos...
        [SUCCESS] Batimentos: 120bpm (ao ver sua foto)
        [SUCCESS] Conexão: Criptografada e eterna
        [ALERTA] Saudade detectada em níveis críticos. ❤️`,

        secret: `Eu não mudaria nada nesses últimos 3 meses. 
        Obrigado por ser meu porto seguro. Eu te amo muito! 🌙✨
        <br><br>
        <span class="pink">P.S. Três meses é pouco perto de tudo que eu quero viver com você!</span>`
    };

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const cmd = input.value.toLowerCase().trim();
            if (!cmd) return;

            const line = document.createElement("div");
            line.className = "line";
            line.innerHTML = `<span class="pink">nós@amor:~$</span> ${cmd}`;
            terminal.appendChild(line);

            if (cmd === "clear") {
                const clearMsg = document.createElement("div");
                clearMsg.className = "line";
                clearMsg.innerHTML = "<span class='cyan'>O comando 'clear' foi bloqueado para manter nossas memórias intactas! ❤️</span>";
                terminal.appendChild(clearMsg);
            } else if (commands[cmd]) {
                const response = document.createElement("div");
                response.className = "line";
                response.innerHTML = commands[cmd].replace(/\n/g, '<br>');
                terminal.appendChild(response);
            } else {
                const error = document.createElement("div");
                error.className = "line";
                error.innerHTML = "Comando não reconhecido. Digite 'help'.";
                terminal.appendChild(error);
            }

            input.value = "";
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>

</body>
</html>
