<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos 3 Meses ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* FUNDO AZUL BEM ESCURO / MIDNIGHT */
            background: radial-gradient(circle at center, #050a14 0%, #020408 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Corações com Brilho Neon */
        .heart-bg {
            position: absolute;
            color: #ff69b4;
            font-size: 22px;
            filter: drop-shadow(0 0 8px #ff1493);
            animation: float 8s linear infinite;
            z-index: 0;
            top: -10%;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            width: 90%;
            max-width: 820px;
            background: rgba(10, 15, 25, 0.95); /* Azul escuro quase preto */
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 20px rgba(255, 105, 180, 0.1);
            padding: 30px;
            z-index: 1;
            border: 1px solid #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #ff85a1;
            letter-spacing: 1px;
        }

        .counter {
            font-size: 14px;
            color: #7dd3fc;
            font-family: 'JetBrains Mono';
        }

        .terminal {
            background: #020408;
            border-radius: 12px;
            padding: 25px;
            height: 380px;
            overflow-y: auto;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.7;
            border: 1px solid rgba(125, 211, 252, 0.1);
        }

        .line { margin: 8px 0; }
        .pink { color: #ff85a1; font-weight: bold; }
        .cyan { color: #7dd3fc; }
        .distance-msg { 
            background: rgba(255, 133, 161, 0.1); 
            padding: 10px; 
            border-radius: 5px; 
            border-left: 3px solid #ff85a1;
        }

        .input-area {
            display: flex;
            margin-top: 20px;
            align-items: center;
        }

        .prompt { color: #ff85a1; margin-right: 12px; font-weight: bold; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #7dd3fc;
            font-family: "JetBrains Mono";
            font-size: 14px;
            outline: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            opacity: .4;
            text-align: center;
            text-transform: uppercase;
        }

        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title">💖 HEART_SHELL v3.0</div>
        <div id="counter" class="counter"></div>
    </div>

    <div class="terminal" id="terminal">
        <div class="line">Carregando módulos de amor... <span class="cyan">[OK]</span></div>
        <div class="line">Verificando 3 meses de história... <span class="cyan">[OK]</span></div>
        <div class="line">--------------------------------------------------</div>
        <div class="line">Bem-vinda(o), amor! Digite <span class="pink">'help'</span> para começar.</div>
    </div>

    <div class="input-area">
        <span class="prompt">nós@amor:~$</span>
        <input id="cmd" autofocus autocomplete="off">
    </div>

    <div class="footer">
        A distância é apenas um detalhe temporário.
    </div>
</div>

<script>
    // --- Configuração da Data ---
    const startDate = new Date("2024-12-10"); // <--- AJUSTE SUA DATA AQUI

    function updateCounter() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("counter").innerHTML = `${days} DIAS JUNTOS ❤️`;
    }
    setInterval(updateCounter, 1000);
    updateCounter();

    // --- Corações ---
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart-bg');
        heart.innerHTML = '❤';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 600);

    // --- Terminal ---
    const terminal = document.getElementById("terminal");
    const input = document.getElementById("cmd");

    const commands = {
        help: `Comandos disponíveis:
        <span class="cyan">about</span>     - Resumo da nossa jornada
        <span class="cyan">memories</span>  - Nossa linha do tempo
        <span class="cyan">distance</span>  - Sobre a nossa distância
        <span class="cyan">love</span>      - Nível de amor
        <span class="cyan">secret</span>    - Uma mensagem secreta`,

        about: `Status: <span class="pink">3 meses de felicidade pura.</span>
        Início: ${startDate.toLocaleDateString('pt-BR')}
        Linguagem: Amor Nativo
        Vulnerabilidades: Nenhuma (Nosso laço é blindado).`,

        memories: `<span class="pink">git log --pretty=format:"%s"</span>
        * O primeiro "oi" que mudou tudo.
        * O frio na barriga do primeiro mês.
        * A certeza vindo no segundo mês.
        * Agora: 3 meses construindo nosso futuro.`,

        distance: `<div class="distance-msg">
        <span class="pink">Sobre a distância:</span><br>
        A distância é passageira, o nosso amor é eterno. São apenas quilômetros 
        tentando competir com o infinito. Logo, logo, o 'bom dia' será 
        sussurrado e não apenas digitado. Aguenta firme, eu estou aqui por você.
        </div>`,

        love: `Calculando...
        Love: [██████████████████] 1000%
        Saudade: [████████████████░░] 90%
        Destino: Traçado ao seu lado. ❤️`,

        secret: `Três meses é pouco perto de tudo que eu quero viver com você. 
        Obrigado por ser meu abrigo, mesmo de longe. Te amo demais!`
    };

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const cmd = input.value.toLowerCase().trim();
            if (!cmd) return;

            const line = document.createElement("div");
            line.className = "line";
            line.innerHTML = `<span class="pink">nós@amor:~$</span> ${cmd}`;
            terminal.appendChild(line);

            if (cmd === "clear") {
                const clearMsg = document.createElement("div");
                clearMsg.className = "line";
                clearMsg.innerHTML = "<span class='cyan'>O comando clear foi bloqueado. Não queremos apagar nossa história! ❤️</span>";
                terminal.appendChild(clearMsg);
            } else if (commands[cmd]) {
                const response = document.createElement("div");
                response.className = "line";
                response.innerHTML = commands[cmd].replace(/\n/g, '<br>');
                terminal.appendChild(response);
            } else {
                const error = document.createElement("div");
                error.className = "line";
                error.innerHTML = "Comando inexistente. Digite 'help'.";
                terminal.appendChild(error);
            }

            input.value = "";
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>

</body>
</html>
